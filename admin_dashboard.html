<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    font-family: Arial, sans-serif;
    background: #6a0dad; /* Purple background */
    margin: 0;
    padding: 0;
    color: white;
}

.dashboard {
    padding: 40px;
    max-width: 900px;
    margin: auto;
}

.complaint-card {
    background: #f3e5ff; /* Light purple for cards */
    color: #330066; /* Dark text for visibility */
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
    position: relative;
}

.complaint-card:hover {
    transform: scale(1.03);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.delete-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 5px 10px;
    border: none;
    border-radius: 6px;
    background: #dc3545;
    color: white;
    cursor: pointer;
}

.clear-btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: #007bff;
    color: white;
    cursor: pointer;
    margin-bottom: 20px;
}

.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:white;
    color: black;
    padding:30px;
    border-radius:15px;
    width:400px;
}

.logout-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: #dc3545;
    color: white;
    cursor: pointer;
}

h1, h3, p {
    margin: 5px 0;
}
</style>
</head>

<body>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="dashboard">
    <h1>Admin Complaint Dashboard</h1>
    <button class="clear-btn" onclick="clearComplaints()">Clear All Complaints</button>
    <div id="complaintList"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Complaint Details</h3>
        <p id="detailText"></p>

        <select id="statusSelect">
            <option>Pending</option>
            <option>In Process</option>
            <option>Resolved</option>
            <option>On Hold</option>
        </select>

        <br><br>
        <button onclick="updateStatus()">Update</button>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>
let complaints = JSON.parse(localStorage.getItem("complaints")) || [];
let complaintList = document.getElementById("complaintList");
let selectedIndex = null;

function renderComplaints() {
    complaintList.innerHTML = "";
    complaints.forEach((c, index) => {
        let card = document.createElement("div");
        card.className = "complaint-card";
        card.innerHTML = `
            <h3>${c.title}</h3>
            <p>Status: ${c.status}</p>
            <button class="delete-btn" onclick="deleteComplaint(${index})">Delete</button>
        `;
        card.onclick = function(e) {
            if(e.target.classList.contains('delete-btn')) return;
            openModal(index);
        };
        complaintList.appendChild(card);
    });
}

// Initial render
renderComplaints();

// Open modal
function openModal(index) {
    selectedIndex = index;
    document.getElementById("modal").style.display = "flex";
    document.getElementById("detailText").innerText = complaints[index].description;
    document.getElementById("statusSelect").value = complaints[index].status;
}

// Close modal
function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// Update status
function updateStatus() {
    let newStatus = document.getElementById("statusSelect").value;
    complaints[selectedIndex].status = newStatus;
    localStorage.setItem("complaints", JSON.stringify(complaints));
    closeModal();
    renderComplaints();
}

// Delete a single complaint
function deleteComplaint(index) {
    if(confirm("Are you sure you want to delete this complaint?")) {
        complaints.splice(index, 1);
        localStorage.setItem("complaints", JSON.stringify(complaints));
        renderComplaints();
    }
}

// Clear all complaints
function clearComplaints() {
    if(complaints.length === 0) {
        alert("No complaints to clear!");
        return;
    }
    if(confirm("Are you sure you want to clear all complaints?")) {
        complaints = [];
        localStorage.setItem("complaints", JSON.stringify(complaints));
        renderComplaints();
    }
}

// Logout
function logout(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
